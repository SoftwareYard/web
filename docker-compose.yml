services:
  api:
    build: ./api
    restart: unless-stopped
    env_file: ./api/.env.production
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - app-net

  ui:
    build: ./ui
    restart: unless-stopped
    env_file: ./ui/.env.production
    networks:
      - app-net

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - ui
      - api
    networks:
      - app-net

networks:
  app-net:
