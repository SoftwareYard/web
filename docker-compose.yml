services:
  api:
    build: ./api
    restart: unless-stopped
    env_file: ./api/.env.production
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:3001:3001"
    networks:
      - app-net

  ui:
    build: ./ui
    restart: unless-stopped
    env_file: ./ui/.env.production
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - app-net

networks:
  app-net:
